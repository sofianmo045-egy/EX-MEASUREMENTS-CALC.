<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX-MEASUREMENTS - Mohamed Shehata</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 10px; }
        #root { max-width: 600px; margin: 0 auto; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        label { font-size: 11px; font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
        .grid { display: flex; gap: 8px; flex-wrap: wrap; }
        .grid-item { flex: 1 1 30%; min-width: 80px; margin-bottom: 10px; }
        .group-box { padding: 12px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
        .result-box { background: #2c3e50; color: white; padding: 15px; border-radius: 10px; margin-top: 10px; }
        .result-item { display: flex; justify-content: space-between; border-bottom: 1px solid #444; padding: 5px 0; }
        .header { text-align: center; color: #d35400; margin-bottom: 15px; }
        .footer { font-size: 12px; text-align: center; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Input = ({ name, val, set }) => (
            <div className="grid-item">
                <label>{name}</label>
                <input type="number" step="0.001" value={val || ""} onChange={(e) => set(name, e.target.value)} />
            </div>
        );

        const Group = ({ title, keys, data, set, bg }) => (
            <div className="group-box" style={{ background: bg }}>
                <h4 style={{ margin: "0 0 10px 0", fontSize: "13px" }}>{title}</h4>
                <div className="grid">
                    {keys.map(k => <Input key={k} name={k} val={data[k]} set={set} />)}
                </div>
            </div>
        );

        function App() {
            const [data, setData] = useState({});
            const set = (k, v) => setData(prev => ({ ...prev, [k]: parseFloat(v) || 0 }));

            // الحسابات الرياضية المأخوذة من الكود الخاص بك
            const hDist = (p1, p2) => Math.sqrt(Math.pow((data[`${p2}E`] - data[`${p1}E`]), 2) + Math.pow((data[`${p2}N`] - data[`${p1}N`]), 2));
            const heading = (Math.atan2((data.G2E - data.G1E), (data.G2N - data.G1N)) * 180) / Math.PI;
            
            const boomLen = hDist('P1', 'P2');
            const stickLen = hDist('P2', 'P3');
            const bucketLen = hDist('P3', 'P4');

            return (
                <div className="card">
                    <div className="header">
                        <h2 style={{margin:0}}>EX-MEASUREMENTS</h2>
                        <small>Senior Hydrographic Surveyor Tools</small>
                    </div>

                    <Group title="GPS Antennas (G1 & G2)" keys={['G1N', 'G1E', 'G1Z', 'G2N', 'G2E', 'G2Z']} data={data} set={set} bg="#eef2f7" />
                    <Group title="Boom Points (P1 & P2)" keys={['P1N', 'P1E', 'P1Z', 'P2N', 'P2E', 'P2Z']} data={data} set={set} bg="#fff9f0" />
                    <Group title="Stick & Bucket (P3 & P4)" keys={['P3N', 'P3E', 'P3Z', 'P4N', 'P4E', 'P4Z']} data={data} set={set} bg="#f0fff4" />

                    <div className="result-box">
                        <h4 style={{margin:"0 0 10px 0", color:"#f1c40f"}}>Calculated Results (Meters)</h4>
                        <div className="result-item"><span>Boom Length:</span> <b>{boomLen.toFixed(3)}</b></div>
                        <div className="result-item"><span>Stick Length:</span> <b>{stickLen.toFixed(3)}</b></div>
                        <div className="result-item"><span>Bucket Length:</span> <b>{bucketLen.toFixed(3)}</b></div>
                        <div className="result-item"><span>Heading:</span> <b>{heading.toFixed(2)}°</b></div>
                    </div>

                    <div className="footer">
                        <p>Developed by: <b>Mohamed Shehata</b></p>
                        <div style={{background:"#fff", padding:"10px", borderRadius:"8px", color:"#333", border:"1px solid #ddd"}}>
                            <b>Install as App:</b><br/>
                            Android: Menu ➔ Add to Home Screen<br/>
                            iOS: Share ➔ Add to Home Screen
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
