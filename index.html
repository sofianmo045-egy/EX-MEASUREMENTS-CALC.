<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EX. Measurements Calculator</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; color: white; margin: 0; padding: 10px; }
        .app-container { max-width: 500px; margin: 0 auto; background: #ffffff; color: #333; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .header { background: #1e293b; color: white; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 18px; text-transform: uppercase; }
        .image-container { width: 100%; padding: 10px; text-align: center; }
        .image-container img { max-width: 100%; border-radius: 10px; }
        .input-group { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; }
        .group-title { font-size: 11px; font-weight: bold; color: #1e293b; margin-bottom: 8px; text-transform: uppercase; }
        .grid { display: flex; gap: 8px; }
        .input-field { flex: 1; }
        .input-field label { display: block; font-size: 10px; color: #64748b; margin-bottom: 3px; }
        input { width: 100%; padding: 7px; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 13px; }
        .calc-btn { width: 90%; margin: 15px 5%; padding: 14px; background: #059669; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .results-area { background: #111827; color: #f8fafc; padding: 20px; }
        .res-line { display: flex; justify-content: space-between; font-size: 13px; margin: 6px 0; }
        .linkedin-btn { display: block; text-align: center; margin-top: 15px; padding: 10px; background: #0077b5; color: white; text-decoration: none; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .install-guide { padding: 20px; background: #f8fafc; border-top: 1px solid #e2e8f0; font-size: 11px; }
        .guide-grid { display: flex; gap: 15px; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;
        const Group = ({ title, keys, data, set }) => (
            <div className="input-group">
                <div className="group-title">{title}</div>
                <div className="grid">
                    {keys.map(k => (
                        <div key={k} className="input-field">
                            <label>{k}</label>
                            <input type="number" step="0.001" value={data[k] || ""} onChange={(e) => set(k, e.target.value)} />
                        </div>
                    ))}
                </div>
            </div>
        );

        function App() {
            const [v, setV] = useState({});
            const [res, setRes] = useState(null);
            const update = (k, val) => setV(prev => ({ ...prev, [k]: val }));

            const calculate = () => {
                const d = {};
                ["X1","Y1","Z1","X2","Y2","Z2","Xs","Ys","Zs","Xp","Yp","Zp","Xst","Yst","Zst","Xbs","Ybs","Zbs","Xb","Yb","Zb"].forEach(k => d[k] = parseFloat(v[k] || 0));
                const Xc = (d.Xp + d.Xs) / 2, Yc = (d.Yp + d.Ys) / 2, Zc = (d.Zp + d.Zs) / 2;
                const hR = Math.atan2(d.Xb - Xc, d.Yb - Yc);
                const getL = (X, Y, Z) => ({ F: (Y-Yc)*Math.cos(hR)+(X-Xc)*Math.sin(hR), S: (X-Xc)*Math.cos(hR)-(Y-Yc)*Math.sin(hR), U: Z-Zc });
                setRes({ h: ((hR*180/Math.PI)+360)%360, a1: getL(d.X1,d.Y1,d.Z1), a2: getL(d.X2,d.Y2,d.Z2), b: Math.sqrt((d.Xst-d.Xs)**2+(d.Yst-d.Ys)**2+(d.Zst-d.Zs)**2), s: Math.sqrt((d.Xbs-d.Xst)**2+(d.Ybs-d.Yst)**2+(d.Zbs-d.Zst)**2) });
            };

            return (
                <div className="app-container">
                    <div className="header"><h1>EX. Measurements</h1><p>Created by Mohamed Shehata</p></div>
                    <div className="image-container"><img src="excavator-diagram.png" /></div>
                    <Group title="ANTENNA 1" keys={["X1","Y1","Z1"]} data={v} set={update} />
                    <Group title="ANTENNA 2" keys={["X2","Y2","Z2"]} data={v} set={update} />
                    <Group title="BOOM PIN STARBOARD" keys={["Xs","Ys","Zs"]} data={v} set={update} />
                    <Group title="BOOM PIN PORTSIDE" keys={["Xp","Yp","Zp"]} data={v} set={update} />
                    <button className="calc-btn" onClick={calculate}>Calculate Results</button>
                    {res && (
                        <div className="results-area">
                            <div className="res-line"><span>Heading:</span> <b>{res.h.toFixed(3)}°</b></div>
                            <div className="res-line"><span>Boom Length:</span> <b>{res.b.toFixed(3)} m</b></div>
                            <div className="res-line"><span>Stick Length:</span> <b>{res.s.toFixed(3)} m</b></div>
                            <a href="https://linkedin.com/in/mohamed-shehata-m045" target="_blank" className="linkedin-btn">Contact me on LinkedIn</a>
                        </div>
                    )}
                    <div className="install-guide">
                        <b>Install as Mobile App</b>
                        <div className="guide-grid">
                            <div><b>iOS:</b> Share ➔ Add to Home Screen</div>
                            <div><b>Android:</b> Menu ➔ Add to Home screen</div>
                        </div>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
